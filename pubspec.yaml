name: whatsapp_clone
description: A WhatsApp-inspired UI clone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: 5.7.0
  firebase_storage: ^12.0.0
  image_picker: ^1.0.7
  permission_handler: ^11.0.1
  flutter_contacts: ^1.1.9
  record: ^5.0.0
  audioplayers: ^5.1.0
  path_provider: ^2.1.1
  http: ^1.6.0
  flutter_dotenv: ^6.0.0
  emoji_picker_flutter: ^4.4.0
  video_player: ^2.10.1
  url_launcher: ^6.3.2
  file_picker: ^10.3.8
  mime: ^2.0.0
  flutter_webrtc: ^0.12.4
  socket_io_client: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
